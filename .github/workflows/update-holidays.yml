name: Update Holidays Data

on:
  schedule:
    # 毎週月曜 09:00 JST (00:00 UTC)
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.fetch.outputs.status }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch and convert holidays data
        id: fetch
        run: |
          set +e
          npm run fetch
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -eq 0 ]; then
            echo "status=changed" >> $GITHUB_OUTPUT
          elif [ $EXIT_CODE -eq 1 ]; then
            echo "::notice::No changes detected - skipping"
            echo "status=skipped" >> $GITHUB_OUTPUT
          else
            echo "::error::Error occurred (exit code: $EXIT_CODE)"
            echo "status=error" >> $GITHUB_OUTPUT
            exit $EXIT_CODE
          fi

      - name: Create Pull Request
        if: steps.fetch.outputs.status == 'changed'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update holidays data"
          title: "chore: update holidays data"
          body: |
            祝日データが更新されました。

            - Source: https://www8.cao.go.jp/chosei/shukujitsu/gaiyou.html
            - Auto-generated by GitHub Actions
          branch: update-holidays-data
          delete-branch: true
          labels: automerge

  automerge:
    needs: update
    if: needs.update.outputs.status == 'changed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable auto-merge
        run: |
          PR_NUMBER=$(gh pr list --label automerge --state open --json number --jq '.[0].number')
          if [ -n "$PR_NUMBER" ]; then
            gh pr merge $PR_NUMBER --auto --squash
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
